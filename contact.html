<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us – The Bank of Sean</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --navy: #0a1628; --gold: #c9a84c; --gold-light: #e8d596; --cream: #f5f0e8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 2.5rem; }
  .card { border: 2px solid var(--gold); padding: 2.5rem; max-width: 420px; width: 100%; }
  .field { margin-bottom: 1.5rem; }
  .label { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold-light); opacity: 0.7; margin-bottom: 0.4rem; }
  .value { font-size: 1.15rem; color: var(--cream); }
  .value a { color: var(--gold); text-decoration: none; }
  .value a:hover { text-decoration: underline; }
  .back { margin-top: 2.5rem; display: inline-block; color: var(--gold); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 2px; }
</style>
</head>
<body>
  <h1>Contact Us</h1>
  <div class="card">
    <div class="field">
      <div class="label">Email</div>
      <div class="value"><a href="mailto:Sean.m.gallagher2@gmail.com">Sean.m.gallagher2@gmail.com</a></div>
    </div>
    <div class="field">
      <div class="label">Phone</div>
      <div class="value"><a href="tel:+353896141073">+353 89 614 1073</a></div>
    </div>
    <div class="field">
      <div class="label">Headquarters</div>
      <div class="value">Wherever Sean happens to be</div>
    </div>
  </div>
  <a href="index.html" class="back">&larr; Back to Home</a>
</body>
</html>
