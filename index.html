<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bank of Sean</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --gold: #c9a84c;
    --gold-light: #e8d596;
    --cream: #f5f0e8;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }
  .tagline {
    font-size: 1rem;
    color: var(--gold-light);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0.7;
  }
  .shield {
    width: 80px; height: 80px;
    border: 3px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem;
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
  }
  nav {
    display: flex; flex-direction: column; gap: 1rem;
    width: 100%; max-width: 340px;
  }
  nav a {
    display: block;
    padding: 1rem 2rem;
    border: 2px solid var(--gold);
    color: var(--gold);
    text-decoration: none;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  nav a:hover {
    background: var(--gold);
    color: var(--navy);
  }
  footer {
    margin-top: 4rem;
    font-size: 0.75rem;
    opacity: 0.35;
  }
</style>
</head>
<body>
  <div class="shield">S</div>
  <h1 class="logo">The Bank of Sean</h1>
  <p class="tagline">Est. 2026 &middot; Dublin</p>
  <nav>
    <a href="contact.html">Contact Us</a>
    <a href="balance.html">See Your Balance</a>
    <a href="terms.html">Terms &amp; Conditions</a>
  </nav>
  <footer>&copy; 2026 The Bank of Sean. All rights reserved. Probably.</footer>
</body>
</html>
